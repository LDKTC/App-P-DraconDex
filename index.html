<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Novel Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="window-frame">
<header id="title-tab-bar">
  <div class="tab-brand" title="Novel Manager">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
  </div>
  <div id="project-tabs" aria-label="Open projects"></div>
  <button id="new-project-tab" class="title-tab-add" title="Open project">+</button>
  <div class="title-drag"></div>
  <div id="settings-menu-wrap">
    <button class="title-settings-btn" id="settings-menu-btn" title="Settings" aria-haspopup="true" aria-expanded="false">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.67 0 1.22.54 1.22 1.21v.58c0 .67-.55 1.21-1.22 1.21a1.65 1.65 0 0 0 0 3z"/>
      </svg>
    </button>
    <div id="settings-menu" class="hidden"></div>
  </div>
  <div id="window-controls">
    <button class="window-btn" id="win-min" title="Minimize">-</button>
    <button class="window-btn" id="win-max" title="Maximize">[]</button>
    <button class="window-btn close" id="win-close" title="Close">x</button>
  </div>
</header>
<div id="app">
  <nav id="nav-sidebar">
    <div class="nav-logo" title="Novel Manager">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <button class="nav-btn active" data-panel="projects" title="โปรเจกต์">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
    </button>
    <button class="nav-btn" data-panel="timeline" title="Timeline">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </button>
    <button class="nav-btn" data-panel="relation" title="ความสัมพันธ์">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <button class="nav-btn" data-panel="map" title="Mapping">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88"/>
      </svg>
    </button>
    <button class="nav-btn" data-panel="hashtag" title="ป้ายกำกับ">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="9" x2="20" y2="9"/>
        <line x1="4" y1="15" x2="20" y2="15"/>
        <line x1="10" y1="3" x2="8" y2="21"/>
        <line x1="16" y1="3" x2="14" y2="21"/>
      </svg>
    </button>
    <div style="flex:1"></div>
    <button class="nav-btn nav-util" id="btn-import-db" title="Import DB">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
    <button class="nav-btn nav-util" id="btn-export-db" title="Export DB">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>
    <button class="nav-btn" data-panel="colors" title="สี">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22C17.52 22 22 17.52 22 12S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm0-18a8 8 0 0 1 8 8 8 8 0 0 1-8 8 8 8 0 0 1-8-8 8 8 0 0 1 8-8z"/>
        <circle cx="7.5" cy="10.5" r="1.5" fill="currentColor"/>
        <circle cx="11.5" cy="7.5" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="9.5" r="1.5" fill="currentColor"/>
        <circle cx="15.5" cy="14.5" r="1.5" fill="currentColor"/>
      </svg>
    </button>
  </nav>
  <aside id="left-panel">
    <div id="search-bar">
      <input id="search-input" placeholder="ค้นหา..." autocomplete="off">
      <button id="left-panel-collapse" class="left-panel-toggle" title="Collapse panel">‹</button>
    </div>
    <div id="left-panel-inner"></div>
  </aside>
  <button id="left-panel-peek" class="left-panel-peek" title="Open panel">+</button>
  <main id="main-area"><div id="main-inner"></div></main>
</div>
</div>
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <div id="modal-head"><span id="modal-title"></span><button id="modal-close">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toast"></div>
  <!-- D3 is lazy-loaded when graph view is rendered -->
  <script src="renderer.js"></script>
</body>
</html>
